/* ───────── PRNG ───────── */

function mulberry32(s) {
  return () => {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
class RNG {
  constructor(seed) { this._next = mulberry32(seed); }
  random() { return this._next(); }
  range(a, b) { return a + this.random() * (b - a); }
  randInt(a, b) { return Math.floor(this.range(a, b + 0.999)); }
}

/* ───────── constants ───────── */

const UP = new THREE.Vector3(0, 1, 0);
const DEG = Math.PI / 180;
const clamp01 = v => Math.max(0, Math.min(1, v));
const easeOut = t => 1 - (1 - t) * (1 - t);

/* ───────── species presets ───────── */

const PRESETS = {
  Oak:    { maxDepth:6, minBr:2, maxBr:3, minAng:40, maxAng:70, lenRatio:.68, trunkLen:3.5, trunkRad:.30, taper:.60, taperCurve:'linear', droop:.08, tropism:-.1, apical:.1, bareTrunk:.15, curvature:.4, crownShape:'sphere', phyllotaxis:137.5, variance:.6, leafDen:12, leafSz:.1, trunkCol:'#5C3A1E', tipCol:'#7A5A3A', leafCol:'#4A0F0C', leafShape:'oak', leafArr:'alternate' },
  Pine:   { maxDepth:7, minBr:2, maxBr:3, minAng:50, maxAng:75, lenRatio:.72, trunkLen:4.0, trunkRad:.18, taper:.58, taperCurve:'linear', droop:.0,  tropism:-.3, apical:.8, bareTrunk:.1, curvature:.1, crownShape:'cone', phyllotaxis:137.5, variance:.3, leafDen:14, leafSz:.1, trunkCol:'#4A3020', tipCol:'#6A5040', leafCol:'#2D5A27', leafShape:'needle', leafArr:'fascicled' },
  Willow: { maxDepth:5, minBr:2, maxBr:3, minAng:25, maxAng:45, lenRatio:.78, trunkLen:3.0, trunkRad:.22, taper:.62, taperCurve:'linear', droop:.85, tropism:.3, apical:.15, bareTrunk:.2, curvature:.6, crownShape:'weeping', phyllotaxis:0, variance:.5, leafDen:18, leafSz:.1, trunkCol:'#5A4530', tipCol:'#7A6550', leafCol:'#6B8E3A', leafShape:'willow', leafArr:'alternate' },
  Bonsai: { maxDepth:5, minBr:2, maxBr:3, minAng:50, maxAng:80, lenRatio:.62, trunkLen:1.6, trunkRad:.18, taper:.58, taperCurve:'linear', droop:.18, tropism:0, apical:.05, bareTrunk:0, curvature:.7, crownShape:'sphere', phyllotaxis:0, variance:.7, leafDen: 7, leafSz:.1, trunkCol:'#4A3525', tipCol:'#6A5545', leafCol:'#3A6B30', leafShape:'round', leafArr:'opposite' },

};

/* ───────── shaders ───────── */

const branchVert = /* glsl */`
varying vec3 vNormal, vWorldPos;
varying vec2 vUv;
void main(){
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorldPos = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;

const branchFrag = /* glsl */`
uniform vec3 uBase, uTip;
varying vec3 vNormal, vWorldPos;
varying vec2 vUv;

float hash(vec3 p){ p=fract(p*.3183099+.1); p*=17.; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }

void main(){
  vec3 col = mix(uBase, uTip, vUv.y);
  col += (hash(vWorldPos*6.0)-.5)*.12;

  col = pow(col, vec3(.45));

  vec3 ld = normalize(vec3(.5,1.,.3));
  float diff = max(dot(vNormal,ld),0.)*.4+.65;
  diff = floor(diff*4.)/4.*.25 + diff*.75;

  vec3 vd = normalize(cameraPosition - vWorldPos);
  float rim = 1.-max(dot(vNormal,vd),0.);
  col *= 1.-rim*.12;

  gl_FragColor = vec4(col*diff, 1.);
}`;

const leafVert = /* glsl */`
attribute float aGrowEnd;
attribute float aSize;
attribute float aRot;
uniform float uReveal;
varying float vAlpha;
varying vec3 vCol;
varying float vRot;
void main(){
  vCol = pow(color, vec3(.45));
  vRot = aRot;
  float t = smoothstep(aGrowEnd-.08, aGrowEnd+.05, uReveal);
  vAlpha = t;
  vec4 mv = modelViewMatrix * vec4(position,1.);
  gl_PointSize = aSize * t * (250./-mv.z);
  gl_Position = projectionMatrix * mv;
  if(t<.01) gl_Position = vec4(9999.);
}`;

const leafFrag = /* glsl */`
uniform sampler2D uMap;
varying float vAlpha;
varying vec3 vCol;
varying float vRot;
void main(){
  vec2 uv = gl_PointCoord - .5;
  float cs = cos(vRot), sn = sin(vRot);
  uv = vec2(uv.x*cs - uv.y*sn, uv.x*sn + uv.y*cs) + .5;
  vec4 tex = texture2D(uMap, uv);
  float a = tex.a * vAlpha;
  if(a < .12) discard;
  vec3 col = vCol * (.85 + tex.r * .15);
  gl_FragColor = vec4(col, a * .92);
}`;

const postVert = /* glsl */`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`;

const postFrag = /* glsl */`
uniform sampler2D tDiffuse;
uniform float uTime;
varying vec2 vUv;
float rand(vec2 c){ return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453); }
void main(){
  vec4 col = texture2D(tDiffuse, vUv);
  col.rgb += (rand(vUv*800.+uTime*.3)-.5)*.06;
  vec2 q = vUv-.5;
  col.rgb *= 1.-dot(q,q)*.4;
  gl_FragColor = col;
}`;

/* ───────── leaf texture ───────── */

function makeLeafTex(shape = 'oak'){
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,64,64);
  ctx.fillStyle = '#ffffff';

  if(shape === 'oak'){
    ctx.beginPath();
    ctx.moveTo(32, 61);
    ctx.bezierCurveTo(29, 59, 26, 57, 23, 54);
    ctx.bezierCurveTo(17, 52.5, 11, 49.5, 9, 45);
    ctx.bezierCurveTo(8, 41.5, 12, 39, 18, 39);
    ctx.bezierCurveTo(14, 37, 9, 33, 9, 29);
    ctx.bezierCurveTo(9, 25, 13, 23, 19, 24);
    ctx.bezierCurveTo(15, 21, 11, 17, 12, 13);
    ctx.bezierCurveTo(13, 10, 17, 9.5, 22, 11);
    ctx.bezierCurveTo(20, 8, 22, 5, 26, 4);
    ctx.bezierCurveTo(28, 3.5, 30, 3, 32, 3);
    ctx.bezierCurveTo(34, 3, 36, 3.5, 38, 4);
    ctx.bezierCurveTo(42, 5, 44, 8, 42, 11);
    ctx.bezierCurveTo(47, 9.5, 51, 10, 52, 13);
    ctx.bezierCurveTo(53, 17, 49, 21, 45, 24);
    ctx.bezierCurveTo(51, 23, 55, 25, 55, 29);
    ctx.bezierCurveTo(55, 33, 50, 37, 46, 39);
    ctx.bezierCurveTo(52, 39, 56, 41.5, 55, 45);
    ctx.bezierCurveTo(53, 49.5, 47, 52.5, 41, 54);
    ctx.bezierCurveTo(38, 57, 35, 59, 32, 61);
    ctx.closePath();
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.6;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  } else if(shape === 'needle'){
    ctx.beginPath();
    ctx.moveTo(32, 2);
    ctx.lineTo(34, 30);
    ctx.lineTo(32, 62);
    ctx.lineTo(30, 30);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, 12);
    ctx.lineTo(32, 16);
    ctx.lineTo(42, 12);
    ctx.lineTo(32, 20);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(20, 28);
    ctx.lineTo(32, 32);
    ctx.lineTo(44, 28);
    ctx.lineTo(32, 36);
    ctx.closePath();
    ctx.fill();
  } else if(shape === 'willow'){
    ctx.beginPath();
    ctx.moveTo(32, 2);
    ctx.bezierCurveTo(38, 14, 40, 40, 36, 62);
    ctx.bezierCurveTo(34, 62, 30, 62, 28, 62);
    ctx.bezierCurveTo(24, 40, 26, 14, 32, 2);
    ctx.fill();
  } else if(shape === 'round'){
    ctx.beginPath();
    ctx.ellipse(32, 32, 14, 22, 0, 0, Math.PI*2);
    ctx.fill();
  } else if(shape === 'fan'){
    ctx.beginPath();
    ctx.moveTo(32, 58);
    ctx.bezierCurveTo(18, 42, 6, 22, 10, 10);
    ctx.bezierCurveTo(16, 4, 24, 2, 32, 6);
    ctx.bezierCurveTo(40, 2, 48, 4, 54, 10);
    ctx.bezierCurveTo(58, 22, 46, 42, 32, 58);
    ctx.fill();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = .6;
    for(let a = -40; a <= 40; a += 20){
      const rad = a * Math.PI / 180;
      ctx.beginPath();
      ctx.moveTo(32, 56);
      ctx.lineTo(32 + Math.sin(rad)*26, 8);
      ctx.stroke();
    }
  } else if(shape === 'maple'){
    const cx = 32, cy = 40, n = 7, sinusR = 5;
    const lengths = [27, 21, 18, 13, 13, 18, 21];
    const angles = [];
    for(let i = 0; i < n; i++) angles.push(-Math.PI / 2 + i * 2 * Math.PI / n);
    function midAng(a, b){
      let m = (a + b) / 2;
      if(b < a) m = (a + b + 2 * Math.PI) / 2;
      return m;
    }
    ctx.beginPath();
    const m0 = midAng(angles[n - 1], angles[0] + 2 * Math.PI);
    ctx.moveTo(cx + Math.cos(m0) * sinusR, cy + Math.sin(m0) * sinusR);
    for(let i = 0; i < n; i++){
      ctx.lineTo(cx + Math.cos(angles[i]) * lengths[i], cy + Math.sin(angles[i]) * lengths[i]);
      const next = angles[(i + 1) % n];
      const ma = i === n - 1 ? midAng(angles[i], next + 2 * Math.PI) : midAng(angles[i], next);
      ctx.lineTo(cx + Math.cos(ma) * sinusR, cy + Math.sin(ma) * sinusR);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.85;
    ctx.lineJoin = 'miter';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.45;
    for(let i = 0; i < n; i++){
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angles[i]) * lengths[i] * 0.9, cy + Math.sin(angles[i]) * lengths[i] * 0.9);
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, 61);
    ctx.stroke();
  }

  if(shape === 'oak'){
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,0.11)';
    ctx.lineWidth = 0.38;
    const veins = [
      [45, 10, 8], [41, 17, 8], [37, 25, 9], [34, 33, 9.5], [31, 41, 10],
    ];
    for(const [y, spread, ext] of veins){
      ctx.beginPath();
      ctx.moveTo(32, y);
      ctx.quadraticCurveTo(32 - spread * 0.45, y - ext * 0.35, 32 - spread, y - ext);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(32, y);
      ctx.quadraticCurveTo(32 + spread * 0.45, y - ext * 0.35, 32 + spread, y - ext);
      ctx.stroke();
    }
  } else if(shape !== 'needle' && shape !== 'fan' && shape !== 'maple'){
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = .6;
    const veins = shape === 'round' ? 4 : 5;
    for(let i = 1; i < veins; i++){
      const y = 8 + i * (48 / veins);
      const spread = i * 4;
      ctx.beginPath(); ctx.moveTo(32, y);
      ctx.quadraticCurveTo(32 + spread, y + 4, 32 + spread * 1.5, y - 2);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(32, y);
      ctx.quadraticCurveTo(32 - spread, y + 4, 32 - spread * 1.5, y - 2);
      ctx.stroke();
    }
  }

  if(shape !== 'maple'){
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = shape === 'needle' ? .5 : .8;
    ctx.beginPath();
    if(shape === 'round'){
      ctx.moveTo(32, 10);
      ctx.lineTo(32, 54);
    } else if(shape === 'oak'){
      ctx.moveTo(32, 3);
      ctx.lineTo(32, 60);
    } else {
      ctx.moveTo(32, 4);
      ctx.lineTo(32, 58);
    }
    ctx.stroke();
  }

  const t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  return t;
}

/* ───────── tree data ───────── */

let nodeId = 0;

function crownMaxRadius(shape, y, H, R){
  const t = clamp01(y / H);
  switch(shape){
    case 'cone':    return R * (1 - t * 0.95);
    case 'sphere':  return R * Math.sin(clamp01(t) * Math.PI);
    case 'column':  return R * 0.35;
    case 'umbrella':{
      const s = clamp01((t - 0.45) / 0.35);
      return R * (0.12 + 0.88 * s * s);
    }
    case 'weeping': return R * 1.4 * Math.sin(clamp01(t * 0.4 + 0.15) * Math.PI);
    default:        return Infinity;
  }
}

function taperAtDepth(baseTaper, depth, maxDepth, curve){
  const t = clamp01(depth / Math.max(maxDepth, 1));
  switch(curve){
    case 'exponential': return baseTaper * (1 - t * 0.35);
    case 'stepped':{
      const step = Math.floor(t * 3) / 3;
      return baseTaper * (1 - step * 0.25);
    }
    default: return baseTaper; // linear — flat multiplier (original behavior)
  }
}

function generateTree(p, rng){
  const MAX_NODES = 600;
  let count = 0;
  const treeH = p.trunkLen * (1 + p.lenRatio * p.maxDepth * 0.55);
  const crownR = treeH * 0.5;

  function makeNode(start, dir, len, rad, depth){
    if(count >= MAX_NODES) return null;
    count++;
    const seed = (nodeId * 137 + 42);
    const br = new RNG(seed);
    const curv = p.curvature || 0;
    const curvScale = 0.1 + curv * 2.4;
    const a1 = len * br.range(.04, .14) * curvScale;
    const d1 = br.range(0, Math.PI * 2);
    const a2 = len * br.range(.03, .10) * curvScale;
    const d2 = br.range(0, Math.PI * 2);
    const cp1t = 0.33, cp2t = 0.66;
    const w1a = Math.sin(cp1t * Math.PI), w2a = Math.sin(cp1t * 2 * Math.PI);
    const w1b = Math.sin(cp2t * Math.PI), w2b = Math.sin(cp2t * 2 * Math.PI);
    const node = {
      id: nodeId++,
      start: start.clone(),
      dir: dir.clone().normalize(),
      len, rad, depth,
      end: start.clone().addScaledVector(dir, len),
      children: [],
      parent: null,
      pruned: false,
      mesh: null,
      growStart: depth * .5,
      controlPoints: [
        { t: cp1t, dx: w1a*Math.cos(d1)*a1 + w2a*Math.cos(d2)*a2, dy: 0, dz: w1a*Math.sin(d1)*a1 + w2a*Math.sin(d2)*a2 },
        { t: cp2t, dx: w1b*Math.cos(d1)*a1 + w2b*Math.cos(d2)*a2, dy: 0, dz: w1b*Math.sin(d1)*a1 + w2b*Math.sin(d2)*a2 },
      ],
    };
    const bareDepth = Math.floor((p.bareTrunk || 0) * p.maxDepth);
    if(depth < p.maxDepth && count < MAX_NODES){
      if(depth < bareDepth){
        // Bare trunk: single continuation with slight wobble
        const ang = rng.range(0, 5) * DEG;
        const roll = rng.range(0, Math.PI * 2);
        const perp = new THREE.Vector3();
        if(Math.abs(dir.y) < .99) perp.crossVectors(dir, UP).normalize();
        else perp.crossVectors(dir, new THREE.Vector3(1,0,0)).normalize();
        perp.applyAxisAngle(dir, roll);
        const cDir = dir.clone().applyAxisAngle(perp, ang);
        cDir.normalize();
        const cLen = len * p.lenRatio * rng.range(.95, 1.05);
        const cRad = rad * taperAtDepth(p.taper, depth, p.maxDepth, p.taperCurve);
        const child = makeNode(node.end, cDir, cLen, cRad, depth+1);
        if(child){ child.parent = node; node.children.push(child); }
      } else {
        const n = rng.randInt(p.minBr, p.maxBr);
        const phyllo = (p.phyllotaxis || 0) * DEG;
        const baseRoll = rng.range(0, Math.PI * 2);
        for(let i = 0; i < n && count < MAX_NODES; i++){
          const isLeader = (i === 0 && (p.apical || 0) > 0);
          const angMul = isLeader ? (1 - p.apical * 0.85) : 1;
          const v = p.variance || 0.5;
          const angMid = (p.minAng + p.maxAng) * 0.5;
          const angHalf = (p.maxAng - p.minAng) * 0.5;
          const ang = (angMid + rng.range(-angHalf, angHalf) * v) * DEG * angMul;
          const roll = phyllo > 0
            ? baseRoll + i * phyllo + rng.range(-0.15, 0.15)
            : rng.range(0, Math.PI * 2);
          const perp = new THREE.Vector3();
          if(Math.abs(dir.y) < .99) perp.crossVectors(dir, UP).normalize();
          else perp.crossVectors(dir, new THREE.Vector3(1,0,0)).normalize();
          perp.applyAxisAngle(dir, roll);
          const cDir = dir.clone().applyAxisAngle(perp, ang);
          cDir.y -= p.droop * (depth + 1) * .08;
          cDir.y -= (p.tropism || 0) * 0.25;
          cDir.normalize();
          const lenVar = v * 0.2;
          let cLen = len * p.lenRatio * rng.range(1 - lenVar, 1 + lenVar);
          let cRad = rad * taperAtDepth(p.taper, depth, p.maxDepth, p.taperCurve);
          if(isLeader){
            cLen *= 1 + p.apical * 0.3;
            cRad *= 1 + p.apical * 0.2;
          }
          // Crown envelope: redirect branches that would exit the shape
          if(p.crownShape && p.crownShape !== 'none'){
            const cEnd = node.end.clone().addScaledVector(cDir, cLen);
            const hDist = Math.sqrt(cEnd.x * cEnd.x + cEnd.z * cEnd.z);
            const maxR = crownMaxRadius(p.crownShape, cEnd.y, treeH, crownR);
            if(hDist > maxR){
              const pull = (hDist - maxR) / hDist;
              cDir.x -= cEnd.x * pull * 0.6;
              cDir.z -= cEnd.z * pull * 0.6;
              if(p.crownShape === 'weeping') cDir.y -= pull * 0.1;
              else cDir.y += pull * 0.15;
              cDir.normalize();
            }
          }
          const child = makeNode(node.end, cDir, cLen, cRad, depth+1);
          if(child){ child.parent = node; node.children.push(child); }
        }
      }
    }
    return node;
  }
  return makeNode(new THREE.Vector3(0,0,0), UP, p.trunkLen, p.trunkRad, 0);
}

function collectBFS(root){
  const out = [], q = [root];
  while(q.length){ const n=q.shift(); out.push(n); for(const c of n.children) q.push(c); }
  return out;
}

/* ───────── mesh building ───────── */

function buildNodeSpline(node){
  const pts = [new THREE.Vector3(0, 0, 0)];
  const sorted = [...node.controlPoints].sort((a,b) => a.t - b.t);
  for(const cp of sorted){
    pts.push(new THREE.Vector3(cp.dx, cp.t * node.len + cp.dy, cp.dz));
  }
  pts.push(new THREE.Vector3(0, node.len, 0));
  return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
}

function makeSplineBranchGeo(node){
  const hSegs = 12, rSegs = 12;
  const spline = buildNodeSpline(node);
  const verts = [], norms = [], uvs = [], indices = [];
  const tmp = new THREE.Vector3();

  for(let j = 0; j <= hSegs; j++){
    const t = j / hSegs;
    const center = spline.getPointAt(t);
    const tangent = spline.getTangentAt(t).normalize();

    let normal = new THREE.Vector3();
    if(Math.abs(tangent.y) < 0.99) normal.crossVectors(tangent, UP).normalize();
    else normal.crossVectors(tangent, new THREE.Vector3(1,0,0)).normalize();
    const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();

    const radius = THREE.MathUtils.lerp(node.rad, node.rad * 0.7, t);

    for(let i = 0; i <= rSegs; i++){
      const angle = (i / rSegs) * Math.PI * 2;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      tmp.copy(center)
        .addScaledVector(normal, cos * radius)
        .addScaledVector(binormal, sin * radius);
      verts.push(tmp.x, tmp.y, tmp.z);
      const n = new THREE.Vector3()
        .addScaledVector(normal, cos)
        .addScaledVector(binormal, sin)
        .normalize();
      norms.push(n.x, n.y, n.z);
      uvs.push(i / rSegs, t);
    }
  }

  for(let j = 0; j < hSegs; j++){
    for(let i = 0; i < rSegs; i++){
      const a = j * (rSegs + 1) + i;
      const b = a + rSegs + 1;
      indices.push(a, b, a + 1);
      indices.push(a + 1, b, b + 1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  return geo;
}

function buildBranches(root, material, group){
  const all = collectBFS(root);
  for(const n of all){
    const g = makeSplineBranchGeo(n);
    const m = new THREE.Mesh(g, material);
    const q = new THREE.Quaternion().setFromUnitVectors(UP, n.dir);
    m.quaternion.copy(q);
    m.position.copy(n.start);
    m.userData.node = n;
    n.mesh = m;
    group.add(m);
  }
  return all;
}

function bentPoint(node, t, rng2){
  const tc = clamp01(t);
  const spline = buildNodeSpline(node);
  const local = spline.getPointAt(tc);
  const q = new THREE.Quaternion().setFromUnitVectors(UP, node.dir);
  local.applyQuaternion(q);

  const radAtT = node.rad * (1 - tc * 0.3);
  const angle = rng2.range(0, Math.PI * 2);
  const radOff = rng2.range(radAtT * 0.5, radAtT * 1.5 + 0.06);
  const perp = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
  perp.applyQuaternion(q);

  return node.start.clone().add(local).addScaledVector(perp, radOff);
}

function bentPointAt(node, t, angle, radius){
  const tc = clamp01(t);
  const spline = buildNodeSpline(node);
  const local = spline.getPointAt(tc);
  const q = new THREE.Quaternion().setFromUnitVectors(UP, node.dir);
  local.applyQuaternion(q);
  const perp = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
  perp.applyQuaternion(q);
  return node.start.clone().add(local).addScaledVector(perp, radius);
}

const GOLDEN_ANGLE = 2.399963;

function getLeafPlacements(node, params, rng){
  const arr = params.leafArr || 'alternate';
  const den = Math.floor(rng.range(3, params.leafDen + 1));
  const radBase = node.rad * 0.8 + 0.04;
  const placements = [];

  const tMin = 0.12, tMax = 0.98;

  if(arr === 'alternate'){
    const n = Math.max(den, 1);
    const step = (tMax - tMin) / Math.max(n - 1, 1);
    for(let i = 0; i < n; i++){
      const t = (i === n - 1) ? tMax : tMin + i * step + rng.range(-step * 0.12, step * 0.12);
      const angle = i * GOLDEN_ANGLE + rng.range(-0.2, 0.2);
      const r = radBase + rng.range(0, 0.06);
      placements.push({ t: clamp01(t), angle, radius: r });
    }
  } else if(arr === 'opposite'){
    const pairs = Math.max(Math.floor(den / 2), 1);
    const step = (tMax - tMin) / Math.max(pairs - 1, 1);
    let baseAngle = rng.range(0, Math.PI);
    for(let i = 0; i < pairs; i++){
      const t = (i === pairs - 1) ? tMax : clamp01(tMin + i * step + rng.range(-step * 0.1, step * 0.1));
      const a = baseAngle + rng.range(-0.15, 0.15);
      placements.push({ t, angle: a, radius: radBase + rng.range(0, 0.05) });
      placements.push({ t, angle: a + Math.PI + rng.range(-0.15, 0.15), radius: radBase + rng.range(0, 0.05) });
      baseAngle += Math.PI / 2 + rng.range(-0.2, 0.2);
    }
  } else if(arr === 'whorled'){
    const whorls = Math.max(Math.floor(den / 4), 1);
    const perWhorl = Math.max(Math.ceil(den / whorls), 3);
    const step = (tMax - tMin) / Math.max(whorls - 1, 1);
    for(let w = 0; w < whorls; w++){
      const t = (w === whorls - 1) ? tMax : clamp01(tMin + w * step + rng.range(-step * 0.1, step * 0.1));
      const offset = rng.range(0, Math.PI * 2);
      for(let i = 0; i < perWhorl; i++){
        const a = offset + (i / perWhorl) * Math.PI * 2 + rng.range(-0.15, 0.15);
        placements.push({ t, angle: a, radius: radBase + rng.range(0, 0.05) });
      }
    }
  } else if(arr === 'fascicled'){
    const clusters = Math.max(Math.floor(rng.range(2, 4)), 1);
    const perCluster = Math.max(Math.ceil(den / clusters), 2);
    for(let c = 0; c < clusters; c++){
      const ct = clamp01(rng.range(0.25, tMax));
      const cAngle = rng.range(0, Math.PI * 2);
      for(let i = 0; i < perCluster; i++){
        const t = clamp01(ct + rng.range(-0.05, 0.05));
        const a = cAngle + rng.range(-0.6, 0.6);
        const r = radBase * 0.5 + rng.range(0, radBase * 0.8);
        placements.push({ t, angle: a, radius: r });
      }
    }
    const tipCluster = Math.max(Math.floor(perCluster * 0.6), 1);
    const tipAngle = rng.range(0, Math.PI * 2);
    for(let i = 0; i < tipCluster; i++){
      placements.push({ t: clamp01(tMax + rng.range(-0.04, 0)), angle: tipAngle + (i / tipCluster) * Math.PI * 2 + rng.range(-0.2, 0.2), radius: radBase * 0.4 + rng.range(0, 0.04) });
    }
  } else if(arr === 'radial'){
    const rings = Math.max(Math.floor(den / 5), 1);
    const perRing = Math.max(Math.ceil(den / rings), 4);
    const step = (tMax - 0.5) / Math.max(rings - 1, 1);
    for(let ri = 0; ri < rings; ri++){
      const t = (ri === rings - 1) ? tMax : clamp01(0.5 + ri * step + rng.range(-0.03, 0.03));
      for(let i = 0; i < perRing; i++){
        const a = (i / perRing) * Math.PI * 2 + rng.range(-0.15, 0.15);
        const rad = radBase + rng.range(0, 0.1);
        placements.push({ t, angle: a, radius: rad });
      }
    }
  } else {
    for(let i = 0; i < den; i++){
      placements.push({ t: rng.range(0.2, 1.0), angle: rng.range(0, Math.PI*2), radius: radBase + rng.range(0, 0.06) });
    }
  }
  return placements;
}

function buildLeaves(root, params, rng){
  const positions=[], colors=[], growEnds=[], sizes=[], rots=[], owners=[];
  const lc = new THREE.Color(params.leafCol);
  const maxGrow = params.maxDepth * .5 + .8;

  function visit(node){
    if(node.pruned) return;
    const living = node.children.filter(c => !c.pruned);
    const isTerminal = living.length === 0;
    if(node.depth >= params.maxDepth - 1 || isTerminal){
      const placements = getLeafPlacements(node, params, rng);
      for(const pl of placements){
        const p = bentPointAt(node, pl.t, pl.angle, pl.radius);
        positions.push(p.x,p.y,p.z);
        let r, g, b;
        if(params.leafShape === 'oak'){
          const autumn = [
            [0.44, 0.11, 0.03], [0.40, 0.09, 0.02], [0.36, 0.07, 0.02],
            [0.32, 0.06, 0.02], [0.48, 0.13, 0.04], [0.42, 0.10, 0.03],
            [0.38, 0.04, 0.07], [0.34, 0.03, 0.06], [0.30, 0.025, 0.05],
            [0.42, 0.06, 0.08], [0.36, 0.04, 0.06], [0.46, 0.08, 0.05],
            [0.40, 0.12, 0.04], [0.34, 0.08, 0.03], [0.50, 0.14, 0.05],
          ];
          const pick = autumn[Math.floor(rng.random() * autumn.length)];
          r = Math.max(0, pick[0] + rng.range(-0.03, 0.02));
          g = Math.max(0, pick[1] + rng.range(-0.03, 0.02));
          b = Math.max(0, pick[2] + rng.range(-0.025, 0.015));
          if(rng.random() < 0.12){
            r = Math.max(0, r * 0.48 + rng.range(0, 0.05));
            g = Math.max(0, g * 0.45 + rng.range(0, 0.04));
            b = Math.max(0, b * 0.42);
          }
        } else {
          r = Math.max(0, lc.r + rng.range(-.08, .08));
          g = Math.max(0, lc.g + rng.range(-.1, .1));
          b = Math.max(0, lc.b + rng.range(-.06, .06));
        }
        colors.push(r,g,b);
        growEnds.push((node.growStart + .8) / (maxGrow*1.1) + rng.range(0,.08));
        sizes.push(rng.range(params.leafSz*8, params.leafSz*18));
        rots.push(rng.range(0, Math.PI*2));
        owners.push(node);
      }
    }
    for(const c of living) visit(c);
  }
  visit(root);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
  geo.setAttribute('aGrowEnd', new THREE.Float32BufferAttribute(growEnds,1));
  geo.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes,1));
  geo.setAttribute('aRot', new THREE.Float32BufferAttribute(rots,1));
  geo.userData = { owners };
  return geo;
}

/* ───────── state ───────── */

const treeGroup = new THREE.Group();
scene.add(treeGroup);

let allNodes = [];
let root = null;
let leafPoints = null;
let junctionSpheres = [];
const junctionGeo = new THREE.SphereGeometry(1, 10, 10);

const state = {
  species: 'Oak',
  seed: Math.floor(Math.random()*99999),
  playing: true,
  growSpeed: 1.0,
  growthTime: 0,
  pruneMode: false,
  showLeaves: true,
  ...structuredClone(PRESETS.Oak),
};
let selectedBranches = [];

let branchMat = null;
let leafMat = null;
let highlightMat = null;
let leafTex = makeLeafTex('oak');

function makeBranchMat(base, tip){
  return new THREE.ShaderMaterial({
    uniforms:{ uBase:{value:new THREE.Color(base)}, uTip:{value:new THREE.Color(tip)} },
    vertexShader: branchVert, fragmentShader: branchFrag,
  });
}

function makeLeafMat(){
  return new THREE.ShaderMaterial({
    uniforms:{ uReveal:{value:0}, uMap:{value:leafTex} },
    vertexShader: leafVert, fragmentShader: leafFrag,
    vertexColors: true, transparent: true, depthWrite: false,
  });
}

highlightMat = new THREE.MeshStandardMaterial({ color:'#ff6633', emissive:'#ff3300', emissiveIntensity:.4 });
const cpMat = new THREE.MeshStandardMaterial({ color:'#ffcc00', emissive:'#ffaa00', emissiveIntensity:.6, depthTest:false });
const endpointMat = new THREE.MeshStandardMaterial({ color:'#ff6600', emissive:'#ff4400', emissiveIntensity:.7, depthTest:false });
const cpGeo = new THREE.SphereGeometry(0.06, 8, 8);
const endpointGeo = new THREE.SphereGeometry(0.08, 10, 10);
const cpGroup = new THREE.Group();
scene.add(cpGroup);

function rebuildBranchMesh(node){
  if(!node.mesh) return;
  const oldGeo = node.mesh.geometry;
  node.mesh.geometry = makeSplineBranchGeo(node);
  oldGeo.dispose();
}

function cpWorldPos(node, cp){
  const spline = buildNodeSpline(node);
  const local = spline.getPointAt(clamp01(cp.t));
  const q = new THREE.Quaternion().setFromUnitVectors(UP, node.dir);
  local.applyQuaternion(q);
  return node.start.clone().add(local);
}

function cascadePositions(node){
  for(const child of node.children){
    if(child.pruned) continue;
    child.start.copy(node.end);
    child.end.copy(child.start.clone().addScaledVector(child.dir, child.len));
    if(child.mesh){
      child.mesh.position.copy(child.start);
    }
    cascadePositions(child);
  }
}

function makeTipHelper(node){
  const tipSphere = new THREE.Mesh(endpointGeo, endpointMat);
  tipSphere.position.copy(node.end);
  const jRadius = node.rad * 0.7 * 1.25;
  if(jRadius > 0.08) tipSphere.scale.setScalar(jRadius / 0.08);
  tipSphere.userData = { type: 'tip', node };
  return tipSphere;
}

function showCPHelpers(node){
  clearCPHelpers();
  for(const cp of node.controlPoints){
    const m = new THREE.Mesh(cpGeo, cpMat);
    m.position.copy(cpWorldPos(node, cp));
    m.userData = { type: 'cp', cp, node };
    cpGroup.add(m);
  }
  cpGroup.add(makeTipHelper(node));
}

function showMultiHelpers(){
  clearCPHelpers();
  for(let i = 0; i < selectedBranches.length; i++){
    cpGroup.add(makeTipHelper(selectedBranches[i]));
  }
}

function clearCPHelpers(){
  while(cpGroup.children.length) cpGroup.remove(cpGroup.children[0]);
}

function updateAllHelpers(){
  for(const m of cpGroup.children){
    const ud = m.userData;
    if(ud.type === 'cp'){
      m.position.copy(cpWorldPos(ud.node, ud.cp));
    } else if(ud.type === 'tip'){
      m.position.copy(ud.node.end);
    }
  }
}

/* ───────── growth ───────── */

function updateGrowth(dt){
  if(!root || !state.playing) return;
  state.growthTime += dt * state.growSpeed;

  const gd = .8;
  for(const node of allNodes){
    if(node.pruned || !node.mesh) continue;
    const raw = clamp01((state.growthTime - node.growStart) / gd);
    const p = easeOut(raw);
    const start = node.parent ? node.parent._curEnd : node.start;
    node._curEnd = start.clone().addScaledVector(node.dir, node.len * p);
    node.mesh.position.copy(start);
    node.mesh.scale.y = Math.max(p, .001);
    node.mesh.visible = p > .001;
  }

  for(const s of junctionSpheres){
    const n = s.userData.node;
    if(!n) continue;
    s.position.copy(n._curEnd);
    const raw = clamp01((state.growthTime - n.growStart) / .8);
    s.visible = raw > 0.3;
  }

  if(leafMat){
    const maxGrow = state.maxDepth * .5 + .8;
    leafMat.uniforms.uReveal.value = clamp01(state.growthTime / (maxGrow * 1.1));
  }
}

/* ───────── pruning ───────── */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const pruneHint = document.getElementById('pruneHint');
const fallingDebris = [];

function getSubtree(node){
  const out = [node];
  const q = [...node.children];
  while(q.length){ const n=q.shift(); out.push(n); q.push(...n.children); }
  return out;
}

function pruneSelected(){
  if(!selectedBranches.length) return;
  const sel = selectedBranches[0];
  if(!sel.parent) return;
  const sub = getSubtree(sel);

  for(const n of sub){
    n.pruned = true;
    if(n.mesh){
      const worldPos = new THREE.Vector3();
      n.mesh.getWorldPosition(worldPos);
      treeGroup.remove(n.mesh);
      scene.add(n.mesh);
      n.mesh.position.copy(worldPos);
      fallingDebris.push({
        mesh: n.mesh,
        vel: new THREE.Vector3((Math.random()-.5)*.5, .5, (Math.random()-.5)*.5),
        rot: new THREE.Vector3((Math.random()-.5)*2, (Math.random()-.5)*2, 0),
        life: 2.0,
      });
    }
  }

  sel.parent.children = sel.parent.children.filter(c => c !== sel);
  selectedBranches = [];

  rebuildLeaves();
}

function scheduleRegrowth(parent){
  if(parent.pruned || parent.depth >= state.maxDepth) return;
  const rng = new RNG(state.seed + parent.id + Date.now());
  const count = rng.randInt(1, 2);
  for(let i = 0; i < count; i++){
    const ang = rng.range(state.minAng, state.maxAng) * DEG;
    const roll = rng.range(0, Math.PI*2);
    const perp = new THREE.Vector3();
    if(Math.abs(parent.dir.y)<.99) perp.crossVectors(parent.dir, UP).normalize();
    else perp.crossVectors(parent.dir, new THREE.Vector3(1,0,0)).normalize();
    perp.applyAxisAngle(parent.dir, roll);
    const cDir = parent.dir.clone().applyAxisAngle(perp, ang);
    cDir.y -= state.droop * (parent.depth+1) * .08;
    cDir.normalize();
    const cLen = parent.len * state.lenRatio * rng.range(.8,1.2);
    const cRad = parent.rad * state.taper;

    const child = {
      id: nodeId++, start: parent.end.clone(), dir: cDir, len: cLen, rad: cRad,
      depth: parent.depth+1, end: parent.end.clone().addScaledVector(cDir, cLen),
      children:[], parent, pruned:false, mesh:null,
      growStart: state.growthTime, _curEnd: parent.end.clone(),
      controlPoints: [],
    };
    parent.children.push(child);
    allNodes.push(child);

    const g = makeSplineBranchGeo(child);
    const m = new THREE.Mesh(g, branchMat);
    m.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(UP, cDir));
    m.position.copy(parent._curEnd || parent.end);
    m.userData.node = child;
    child.mesh = m;
    m.scale.y = .001;
    treeGroup.add(m);
  }
  rebuildLeaves();
}

function rebuildLeaves(){
  if(leafPoints){ treeGroup.remove(leafPoints); leafPoints.geometry.dispose(); }
  const rng2 = new RNG(state.seed + 7777);
  const geo = buildLeaves(root, state, rng2);
  leafPoints = new THREE.Points(geo, leafMat);
  leafPoints.visible = state.showLeaves;
  treeGroup.add(leafPoints);
  if(leafMat) leafMat.uniforms.uReveal.value = 1.0;
  rebuildJunctions();
}

function rebuildJunctions(){
  for(const s of junctionSpheres) treeGroup.remove(s);
  junctionSpheres = [];
  if(!root || !branchMat) return;
  for(const n of allNodes){
    if(n.pruned) continue;
    const hasLivingChildren = n.children.filter(c => !c.pruned).length > 0;
    const r = hasLivingChildren ? n.rad * 0.7 * 1.25 : n.rad * 0.7;
    const s = new THREE.Mesh(junctionGeo, branchMat);
    s.position.copy(n._curEnd || n.end);
    s.scale.setScalar(r);
    s.userData.node = n;
    s.raycast = () => {};
    n.junctionMesh = s;
    treeGroup.add(s);
    junctionSpheres.push(s);
  }
}

function updateJunctionForNode(node){
  if(!node.junctionMesh) return;
  node.junctionMesh.position.copy(node._curEnd || node.end);
  const hasLivingChildren = node.children.filter(c => !c.pruned).length > 0;
  node.junctionMesh.scale.setScalar(hasLivingChildren ? node.rad * 0.7 * 1.25 : node.rad * 0.7);
}

let _selLeaf = -1;
let _selLeafColor = null;

function clearLeafSel(){
  if(_selLeaf < 0 || !leafPoints) return;
  const ca = leafPoints.geometry.getAttribute('color');
  if(ca && _selLeafColor){
    ca.setXYZ(_selLeaf, _selLeafColor[0], _selLeafColor[1], _selLeafColor[2]);
    ca.needsUpdate = true;
  }
  _selLeaf = -1;
  _selLeafColor = null;
}

function clearBranchSel(){
  for(const n of selectedBranches){
    if(n.mesh) n.mesh.material = branchMat;
    if(n.parent && n.parent.junctionMesh) n.parent.junctionMesh.material = branchMat;
    if(n.junctionMesh) n.junctionMesh.material = branchMat;
  }
  selectedBranches = [];
  clearCPHelpers();
}

function highlightJunctionsForSelection(){
  for(const n of selectedBranches){
    if(n.parent && n.parent.junctionMesh) n.parent.junctionMesh.material = highlightMat;
    if(n.junctionMesh) n.junctionMesh.material = highlightMat;
  }
}

function dropSelectedLeaf(){
  if(_selLeaf < 0 || !leafPoints) return;
  const geo = leafPoints.geometry;
  const pa = geo.getAttribute('position');
  const sa = geo.getAttribute('aSize');
  const idx = _selLeaf;
  const pos = new THREE.Vector3(pa.getX(idx), pa.getY(idx), pa.getZ(idx));
  const origCol = _selLeafColor || [0.3,0.5,0.2];
  const sz = sa.getX(idx);

  sa.setX(idx, 0);
  sa.needsUpdate = true;
  clearLeafSel();

  const sm = new THREE.SpriteMaterial({
    map: leafTex,
    color: new THREE.Color(origCol[0], origCol[1], origCol[2]),
    transparent: true,
  });
  const sp = new THREE.Sprite(sm);
  sp.position.copy(pos);
  const s = Math.max(sz * 0.015, 0.05);
  sp.scale.set(s, s*1.3, 1);
  scene.add(sp);
  fallingDebris.push({
    mesh: sp,
    vel: new THREE.Vector3((Math.random()-.5)*.4, 0, (Math.random()-.5)*.4),
    rot: new THREE.Vector3(0,0,(Math.random()-.5)*2),
    life: 2.5,
  });
}

canvas.addEventListener('click', e => {
  if(wasDragging){ wasDragging = false; return; }
  if(!state.pruneMode) return;
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = allNodes.filter(n=>n.mesh&&!n.pruned).map(n=>n.mesh);
  const branchHits = raycaster.intersectObjects(meshes);

  let leafHits = [];
  if(leafPoints && state.showLeaves){
    raycaster.params.Points.threshold = 0.15;
    leafHits = raycaster.intersectObject(leafPoints);
  }

  const bDist = branchHits.length ? branchHits[0].distance : Infinity;
  const lDist = leafHits.length ? leafHits[0].distance : Infinity;

  if(leafHits.length && (!branchHits.length || lDist < bDist - 0.5)){
    clearBranchSel();
    const idx = leafHits[0].index;
    if(_selLeaf === idx){ clearLeafSel(); return; }
    clearLeafSel();
    const ca = leafPoints.geometry.getAttribute('color');
    _selLeafColor = [ca.getX(idx), ca.getY(idx), ca.getZ(idx)];
    _selLeaf = idx;
    ca.setXYZ(idx, 0.85, 0.12, 0.08);
    ca.needsUpdate = true;
    return;
  }

  if(branchHits.length){
    clearLeafSel();
    const hitNode = branchHits[0].object.userData.node;

    if(e.shiftKey && selectedBranches.length > 0){
      if(selectedBranches.includes(hitNode)){
        return;
      }
      const last = selectedBranches[selectedBranches.length - 1];
      const first = selectedBranches[0];
      if(last.children.includes(hitNode)){
        selectedBranches.push(hitNode);
        hitNode.mesh.material = highlightMat;
        highlightJunctionsForSelection();
        showMultiHelpers();
      } else if(hitNode.children.includes(first)){
        selectedBranches.unshift(hitNode);
        hitNode.mesh.material = highlightMat;
        highlightJunctionsForSelection();
        showMultiHelpers();
      }
    } else {
      if(selectedBranches.length === 1 && selectedBranches[0] === hitNode){
        const hit = branchHits[0];
        const worldPt = hit.point;
        const localPt = worldPt.clone().sub(hitNode.start);
        const q = new THREE.Quaternion().setFromUnitVectors(UP, hitNode.dir);
        const qInv = q.clone().invert();
        localPt.applyQuaternion(qInv);
        const t = clamp01(localPt.y / hitNode.len);
        hitNode.controlPoints.push({ t, dx: 0, dy: 0, dz: 0 });
        rebuildBranchMesh(hitNode);
        showCPHelpers(hitNode);
        return;
      }
      clearBranchSel();
      selectedBranches = [hitNode];
      hitNode.mesh.material = highlightMat;
      highlightJunctionsForSelection();
      showCPHelpers(hitNode);
    }
    return;
  }

  clearLeafSel();
  clearBranchSel();
});

let dragType = null;
let dragCP = null;
let dragNode = null;
let dragPlane = null;
let dragStartWorld = null;
let dragStartDx = 0, dragStartDy = 0, dragStartDz = 0;
let wasDragging = false;

canvas.addEventListener('pointerdown', e => {
  if(!state.pruneMode || !cpGroup.children.length) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(cpGroup.children);
  if(!hits.length) return;

  const hitMesh = hits[0].object;
  const ud = hitMesh.userData;
  dragType = ud.type;
  dragNode = ud.node;

  if(dragType === 'cp'){
    dragCP = ud.cp;
    dragStartDx = dragCP.dx;
    dragStartDy = dragCP.dy;
    dragStartDz = dragCP.dz;
    dragStartWorld = cpWorldPos(dragNode, dragCP);
  } else if(dragType === 'tip'){
    dragCP = null;
    dragStartWorld = dragNode.end.clone();
  }

  const camDir = camera.getWorldDirection(new THREE.Vector3());
  dragPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, dragStartWorld);

  controls.enabled = false;
  e.preventDefault();
  e.stopPropagation();
});

canvas.addEventListener('pointermove', e => {
  if(!dragType || !dragNode) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const newWorld = new THREE.Vector3();
  if(!raycaster.ray.intersectPlane(dragPlane, newWorld)) return;

  if(dragType === 'cp'){
    const delta = newWorld.clone().sub(dragStartWorld);
    const q = new THREE.Quaternion().setFromUnitVectors(UP, dragNode.dir);
    const qInv = q.clone().invert();
    const localDelta = delta.clone().applyQuaternion(qInv);
    dragCP.dx = dragStartDx + localDelta.x;
    dragCP.dy = dragStartDy + localDelta.y;
    dragCP.dz = dragStartDz + localDelta.z;
    rebuildBranchMesh(dragNode);
  } else if(dragType === 'tip'){
    dragNode.end.copy(newWorld);
    const toEnd = newWorld.clone().sub(dragNode.start);
    dragNode.len = toEnd.length();
    if(dragNode.len > 0.01){
      dragNode.dir.copy(toEnd.normalize());
    }
    if(dragNode.mesh){
      dragNode.mesh.quaternion.setFromUnitVectors(UP, dragNode.dir);
    }
    rebuildBranchMesh(dragNode);
    cascadePositions(dragNode);
    updateJunctionForNode(dragNode);
    for(const child of dragNode.children){
      if(!child.pruned && child.mesh){
        child.mesh.position.copy(child.start);
        rebuildBranchMesh(child);
      }
    }
  }
  updateAllHelpers();
});

canvas.addEventListener('pointerup', () => {
  if(!dragType) return;
  wasDragging = true;
  dragType = null;
  dragCP = null;
  dragNode = null;
  dragPlane = null;
  controls.enabled = true;
  rebuildLeaves();
});

window.addEventListener('keydown', e => {
  if(!state.pruneMode) return;

  if(e.key === 'Delete' || e.key === 'Backspace'){
    if(_selLeaf >= 0){ dropSelectedLeaf(); return; }
    if(selectedBranches.length){ pruneSelected(); return; }
    return;
  }

  if(selectedBranches.length !== 1) return;
  const n = selectedBranches[0];
  if(!n.controlPoints.length) return;
  const arrows = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
  if(!arrows.includes(e.key)) return;
  e.preventDefault();

  const cp = n.controlPoints[n.controlPoints.length - 1];
  const step = n.len * 0.06;
  if(e.key === 'ArrowLeft')  cp.dx -= step;
  if(e.key === 'ArrowRight') cp.dx += step;
  if(e.key === 'ArrowUp')    cp.dz -= step;
  if(e.key === 'ArrowDown')  cp.dz += step;
  rebuildBranchMesh(n);
  updateAllHelpers();
  rebuildLeaves();
});

/* ───────── rebuild ───────── */

function rebuild(){
  while(treeGroup.children.length){
    const c = treeGroup.children[0];
    treeGroup.remove(c);
    if(c.geometry) c.geometry.dispose();
  }
  fallingDebris.length = 0;
  junctionSpheres = [];
  selectedBranches = [];
  clearCPHelpers();
  state.growthTime = 0;
  state.playing = true;
  nodeId = 0;

  branchMat = makeBranchMat(state.trunkCol, state.tipCol);
  leafTex = makeLeafTex(state.leafShape || 'oak');
  leafMat = makeLeafMat();

  const rng = new RNG(state.seed);
  root = generateTree(state, rng);
  allNodes = collectBFS(root);
  allNodes.forEach(n => { n._curEnd = n.start.clone(); });

  buildBranches(root, branchMat, treeGroup);
  rebuildJunctions();

  const rng2 = new RNG(state.seed + 7777);
  const leafGeo = buildLeaves(root, state, rng2);
  leafPoints = new THREE.Points(leafGeo, leafMat);
  leafPoints.visible = state.showLeaves;
  treeGroup.add(leafPoints);

  controls.target.set(0, state.trunkLen * 1.2, 0);
}

/* ───────── GUI ───────── */

const gui = new GUI({ title: 'Painterly Tree' });

const specObj = { species: state.species };
gui.add(specObj, 'species', Object.keys(PRESETS)).name('Species').onChange(v => {
  Object.assign(state, structuredClone(PRESETS[v]));
  state.species = v;
  rebuild();
  refreshGUI();
});

const fGrow = gui.addFolder('Growth');
fGrow.add(state, 'growSpeed', .1, 3, .1).name('Speed');
fGrow.add({ play(){ state.playing = !state.playing; } }, 'play').name('Play / Pause');
fGrow.add({ regrow(){ state.growthTime=0; state.playing=true; } }, 'regrow').name('Regrow');

const fStruct = gui.addFolder('Structure');
const structCtrls = [];
structCtrls.push(fStruct.add(state,'maxDepth',3,8,1).name('Depth'));
structCtrls.push(fStruct.add(state,'minBr',1,4,1).name('Min Branches'));
structCtrls.push(fStruct.add(state,'maxBr',2,5,1).name('Max Branches'));
structCtrls.push(fStruct.add(state,'minAng',5,60,1).name('Min Angle'));
structCtrls.push(fStruct.add(state,'maxAng',15,90,1).name('Max Angle'));
structCtrls.push(fStruct.add(state,'lenRatio',.4,.9,.01).name('Length Ratio'));
structCtrls.push(fStruct.add(state,'droop',0,1,.01).name('Droop'));
structCtrls.push(fStruct.add(state,'tropism',-1,1,.01).name('Tropism'));
structCtrls.push(fStruct.add(state,'apical',0,1,.01).name('Apical Dominance'));
structCtrls.push(fStruct.add(state,'bareTrunk',0,1,.01).name('Bare Trunk'));
structCtrls.push(fStruct.add(state,'curvature',0,1,.01).name('Curvature'));
structCtrls.push(fStruct.add(state,'taperCurve',['linear','exponential','stepped']).name('Taper Curve'));
structCtrls.push(fStruct.add(state,'crownShape',['none','cone','sphere','column','umbrella','weeping']).name('Crown Shape'));
structCtrls.push(fStruct.add(state,'phyllotaxis',0,360,0.5).name('Phyllotaxis'));
structCtrls.push(fStruct.add(state,'variance',0,1,.01).name('Variance'));
structCtrls.forEach(c => c.onChange(() => rebuild()));
fStruct.close();

const fStyle = gui.addFolder('Style');
fStyle.addColor(state,'trunkCol').name('Trunk').onChange(()=>rebuild());
fStyle.addColor(state,'leafCol').name('Leaves').onChange(()=>rebuildLeaves());
fStyle.add(state,'leafDen',2,25,1).name('Leaf Density').onChange(()=>rebuildLeaves());
fStyle.add(state,'leafSz',.1,1,.05).name('Leaf Size').onChange(()=>rebuildLeaves());
fStyle.add(state,'leafArr',['alternate','opposite','whorled','fascicled','radial']).name('Arrangement').onChange(()=>rebuildLeaves());
fStyle.close();

gui.add(state,'pruneMode').name('Prune Mode').onChange(v => {
  pruneHint.style.display = v ? 'block' : 'none';
  if(!v){
    clearLeafSel();
    clearBranchSel();
  }
});
gui.add(state,'showLeaves').name('Show Leaves').onChange(v => {
  if(v) rebuildLeaves();
  if(leafPoints) leafPoints.visible = v;
});

gui.add({ newSeed(){ state.seed=Math.floor(Math.random()*99999); rebuild(); }}, 'newSeed').name('New Seed');

function refreshGUI(){ gui.controllersRecursive().forEach(c => c.updateDisplay()); }

/* ───────── animate ───────── */

const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), .05);
  controls.update();
  updateGrowth(dt);
  postShader.uniforms.uTime.value = clock.elapsedTime;

  for(let i = fallingDebris.length-1; i>=0; i--){
    const d = fallingDebris[i];
    d.vel.y -= 9.8 * dt;
    d.mesh.position.addScaledVector(d.vel, dt);
    d.mesh.rotation.x += d.rot.x * dt;
    d.mesh.rotation.z += d.rot.z * dt;
    d.life -= dt;
    d.mesh.material.opacity = Math.max(d.life/.5, 0);
    d.mesh.material.transparent = true;
    if(d.life <= 0){
      scene.remove(d.mesh);
      d.mesh.geometry.dispose();
      fallingDebris.splice(i,1);
    }
  }

  composer.render();
}

/* ───────── resize ───────── */

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* ───────── go ───────── */

rebuild();
animate();

</script>
